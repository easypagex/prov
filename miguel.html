<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miguel Such · Le Provocatour</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 30%, #1e1a2e 0%, #0d0b18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      padding: 2rem 1rem;
    }

    /* Particle bg */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #c9a96e;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
    }

    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Title */
    .eyebrow {
      color: #c9a96e;
      font-size: 0.65rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      opacity: 0.7;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      color: #f0e8d8;
      font-size: 2.1rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      margin-bottom: 1.8rem;
    }

    /* Photo */
    .photo-ring {
      position: relative;
      cursor: pointer;
      border-radius: 50%;
      padding: 4px;
      background: conic-gradient(#c9a96e, #8b6914, #e8c97a, #c9a96e);
      box-shadow: 0 0 40px #c9a96e33, 0 20px 60px rgba(0,0,0,0.7);
      transition: transform 0.2s ease;
    }
    .photo-ring:active { transform: scale(0.96); }

    .photo-ring img {
      width: 280px;
      height: 280px;
      object-fit: cover;
      object-position: top center;
      border-radius: 50%;
      display: block;
      border: 4px solid #0d0b18;
      animation: none;
    }

    .click-hint {
      margin-top: 1rem;
      color: #ffffff30;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Bubble */
    .bubble-outer {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .bubble-tail {
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 14px solid rgba(255,255,255,0.06);
    }

    .bubble {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(201,169,110,0.3);
      color: #f0e8d8;
      padding: 16px 26px;
      border-radius: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-style: italic;
      font-weight: 300;
      max-width: 320px;
      text-align: center;
      line-height: 1.5;
      position: relative;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubble-text {
      display: block;
      animation: textFade 0.6s ease;
    }
    @keyframes textFade {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }



    /* Progress bar */
    .progress-bar {
      width: 280px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b6914, #c9a96e, #e8c97a);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Button */
    .cta-btn {
      margin-top: 2.2rem;
      display: inline-block;
      padding: 12px 36px;
      background: transparent;
      border: 1px solid #c9a96e;
      color: #c9a96e;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 40px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #c9a96e;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
      z-index: -1;
    }
    .cta-btn:hover {
      color: #0d0b18;
    }
    .cta-btn:hover::before {
      transform: scaleX(1);
    }
  </style>
</head>

    // ── Frases motivacionals del web (seqüencial)
    const frasesProvo = [
      "No es una cena. Es un viaje.",
      "Queremos que cada invitado deje atrás el teléfono, las prisas y las preocupaciones.",
      "Poco a poco, sentirás que el tiempo empieza a detenerse.",
      "Descalzos entre las viñas, compartiendo pan recién horneado, aceite y miel.",
      "El mayor espectáculo de la noche es la naturaleza.",
      "Cada plato representa un valor. Un viaje sensorial con los ojos vendados.",
      "La cultura no decora la noche. La noche es la obra.",
      "Sin teléfonos. Con preguntas verdaderas.",
      "El lujo más escaso del siglo XXI: personas con quienes vale la pena detener el tiempo.",
      "Quizá el verdadero lujo siempre fue encontrar personas con las que merecía la pena detener el tiempo.",
      "No es que tengamos poco tiempo… Sino que perdemos demasiado.",
      "Hoy, durante unas horas, hemos dejado de correr.",
      "Hemos vuelto a mirar a los ojos. Hemos compartido una mesa.",
      "Esta noche no queremos que elijas entre beber o no beber. Queremos que elijas cómo quieres sentirte.",
    ];

    // ── Frases mallorquines (aleatòries)
    const frasesMallorca = [
      "Uep! Com anam?",
      "Mem",
      "Mos deim coses",
      "Què em som jo de la mort de'n Berga?",
      "Has fet es negoci de na Peix Frit",
      "Això és mel",
      "Cristo en pel, taronges navel",
      "Mesclar ous amb caragols",
      "D'es teu pa faràs sopes",
      "Cap de fava amb orelles",
      "Que n'ets de poma!",
    ];

    let isAlt = false;
    let provoIndex = 0;
    let useMallorca = false;  // alternates every cycle
    const photoEl = document.getElementById('photo');
    const bubbleTextEl = document.getElementById('bubbleText');
    const bubbleEl = document.querySelector('.bubble');
    const progressFill = document.getElementById('progressFill');

    function nextPhrase() {
      // Alternate: one provocatour, one mallorca
      let text;
      if (useMallorca) {
        text = frasesMallorca[Math.floor(Math.random() * frasesMallorca.length)];
      } else {
        text = frasesProvo[provoIndex % frasesProvo.length];
        provoIndex++;
      }
      useMallorca = !useMallorca;

      bubbleTextEl.style.animation = 'none';
      bubbleTextEl.offsetHeight;
      bubbleTextEl.textContent = text;
      bubbleTextEl.style.animation = 'textFade 0.6s ease';
    }

    function swapImages() {
      isAlt = !isAlt;
      photoEl.src = isAlt ? img8 : img1;
    }

    function handleClick() {
      swapImages();
      nextPhrase();
      playFlabiol();
      resetProgress();
    }

    // ── Auto cycle every 8 s (no sound)
    const INTERVAL = 8000;
    let startTime = Date.now();
    let rafId;

    function resetProgress() {
      startTime = Date.now();
    }

    function animateProgress() {
      const elapsed = Date.now() - startTime;
      const pct = Math.min((elapsed / INTERVAL) * 100, 100);
      progressFill.style.width = pct + '%';
      rafId = requestAnimationFrame(animateProgress);
    }
    animateProgress();

    setInterval(() => {
      swapImages();
      nextPhrase();
      resetProgress();
    }, INTERVAL);

    // ── Flabiol i Tamborino mallorquí synthesis
    function playFlabiol() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Tamborino — baix profund
      const sr = ctx.sampleRate;
      const bufLen = sr * 0.55;
      const buf = ctx.createBuffer(1, bufLen, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) {
        const t = i / sr;
        data[i] =
          Math.exp(-t * 20) * (Math.random() * 2 - 1) * 0.55 +
          Math.exp(-t * 9)  * Math.sin(2 * Math.PI * 75 * t) * 0.85 +
          Math.exp(-t * 5)  * Math.sin(2 * Math.PI * 40 * t) * 0.4;
      }
      const drum = ctx.createBufferSource();
      drum.buffer = buf;
      const dg = ctx.createGain();
      dg.gain.setValueAtTime(0.75, ctx.currentTime);
      dg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      drum.connect(dg).connect(ctx.destination);
      drum.start(ctx.currentTime);

      // Tamborino beat 2 (eco)
      const drum2 = ctx.createBufferSource();
      drum2.buffer = buf;
      const dg2 = ctx.createGain();
      dg2.gain.setValueAtTime(0.4, ctx.currentTime);
      dg2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      drum2.connect(dg2).connect(ctx.destination);
      drum2.start(ctx.currentTime + 0.38);

      // Flabiol — melodia pentatònica
      const melody = [
        { f: 659.25, t: 0.00 },
        { f: 783.99, t: 0.13 },
        { f: 880.00, t: 0.26 },
        { f: 1046.5, t: 0.36 },
        { f: 880.00, t: 0.50 },
        { f: 783.99, t: 0.62 },
        { f: 659.25, t: 0.74 },
        { f: 587.33, t: 0.86 },
        { f: 523.25, t: 0.96 },
      ];
      const noteDur = 0.13;

      melody.forEach(({ f, t }) => {
        const startT = ctx.currentTime + t;
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.value = f;

        // vibrato
        const lfo = ctx.createOscillator();
        lfo.frequency.value = 5.5;
        const lfog = ctx.createGain();
        lfog.gain.value = 5;
        lfo.connect(lfog).connect(osc.frequency);
        lfo.start(startT + 0.04);
        lfo.stop(startT + noteDur);

        const env = ctx.createGain();
        env.gain.setValueAtTime(0, startT);
        env.gain.linearRampToValueAtTime(0.22, startT + 0.018);
        env.gain.setValueAtTime(0.22, startT + noteDur * 0.65);
        env.gain.linearRampToValueAtTime(0, startT + noteDur * 0.95);

        const filt = ctx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = 1800;
        filt.Q.value = 1.2;

        osc.connect(env).connect(filt).connect(ctx.destination);
        osc.start(startT);
        osc.stop(startT + noteDur);
      });
    }

    // ── Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.bottom = '-10px';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.opacity = 0;
      container.appendChild(p);
    }
